# Mark II Studio — Docker Compose
# Development stack: Postgres + Redis + Backend + Frontend

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: markii
      POSTGRES_PASSWORD: markii
      POSTGRES_DB: markii_studio
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U markii"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./studio/backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://markii:markii@postgres:5432/markii_studio
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./studio/backend:/app
      - ./mark_ii:/mark_ii

  frontend:
    build:
      context: ./studio/frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./studio/frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  pgdata:
